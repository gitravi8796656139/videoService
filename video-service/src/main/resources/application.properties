# Server port
server.port=8080

# Storage root — all videos and metadata.json go here
# Change this to any absolute path on your server, e.g. /home/ubuntu/videos
video.storage.path=./video-storage

# Max upload size
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5GB
spring.servlet.multipart.max-request-size=5GB

# Allowed MIME types
video.allowed-types=video/mp4,video/avi,video/mkv,video/mov,video/webm,video/x-matroska,video/quicktime
